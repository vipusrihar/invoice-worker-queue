# ============================================================
#  RabbitMQ Connection
# ============================================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ============================================================
#  Queue / Exchange / Routing Key Names
# ============================================================
rabbitmq.queue.name=invoice_generation_queue
rabbitmq.exchange.name=invoice.direct.exchange
rabbitmq.routing.key=invoice.generate

# ============================================================
#  Fair Dispatch: only 1 unacknowledged message per worker
# ============================================================
spring.rabbitmq.listener.simple.prefetch=1

# ============================================================
#  Manual Acknowledgment (never auto-ack)
# ============================================================
spring.rabbitmq.listener.simple.acknowledge-mode=manual

# ============================================================
#  Concurrent consumers (simulates multiple workers)
# ============================================================
spring.rabbitmq.listener.simple.concurrency=2
spring.rabbitmq.listener.simple.max-concurrency=5

# ============================================================
#  Server port
# ============================================================
server.port=8081
